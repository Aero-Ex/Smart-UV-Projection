name: Build Wheels

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build and Test (${{ matrix.os }}, Py ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build sdist and universal wheel
        run: python -m build

      - name: Test installation
        shell: bash
        run: |
          pip install dist/*.whl
          python -c "from smart_uv import smart_uv_unwrap; print('Successfully imported smart_uv_unwrap')"

      - name: Upload artifacts
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: Smart-UV-Projection-dists
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [build_wheels]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download dists
        uses: actions/download-artifact@v4
        with:
          name: Smart-UV-Projection-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@skip-existing
